<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="card auth-card">
    <h1>Create account</h1>
    <p class="subtitle">Fill in the details below to get started.</p>

    {% if msg %}
    <div class="msg {% if 'successful' in msg %}msg-success{% else %}msg-error{% endif %}">
      {{ msg }}
    </div>
    {% endif %}

    <form method="post">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="choose a username" required autocomplete="username"/>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password"/>
      </div>
      <div class="field">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" placeholder="••••••••" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-full"><span>Create Account</span></button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>
</body>
</html>
